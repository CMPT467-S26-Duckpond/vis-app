services:
  mongo:
    image: mongo:latest
    container_name: 467mongo
    # ports:
    # - "3001:27017"
    restart: "unless-stopped"
    volumes:
      - "../data/scripts/467projdata.archive.gz:/restore/467projdata.archive.gz:ro"
      - "../data/scripts/mongo_restore.sh:/docker-entrypoint-initdb.d/mongo_restore.sh:ro"
    init: true

  # mongo-express:
  #   image: mongo-express:latest
  #   container_name: 467mongo-express
  #   ports:
  #     - "3002:8081"
  #   restart: "unless-stopped"
  #   environment:
  #     ME_CONFIG_MONGODB_SERVER: mongo
  #     ME_CONFIG_MONGODB_PORT: 27017
  #     ME_CONFIG_BASICAUTH_USERNAME: user
  #     ME_CONFIG_BASICAUTH_PASSWORD: pass

  web:
    build: .
    container_name: 467web
    environment:
      NUXT_MONGO_URI: "mongodb://mongo:27017/467projdata"
    ports:
      - "3000:80"
